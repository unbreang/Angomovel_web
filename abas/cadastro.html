<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <title>Cadastro AngoMovel - Junte-se a nós</title>
    <link rel="stylesheet" href="../css/cadastro.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="ph-fill ph-buildings"></i>
                <h2>Cadastrar Empresa</h2>
                <p>Preencha os dados para aparecer no nosso mapa.</p>
            </div>

            <form id="formCadastro">
                <div class="input-group">
                    <label>Nome da Empresa/Guia</label>
                    <input type="text" id="nome" placeholder="Ex: Resort Pululu" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Categoria</label>
                        <select id="categoria" required>
                            <option value="praias">Praias</option>
                            <option value="parques">Parques</option>
                            <option value="cultura">Cultura</option>
                            <option value="gastronomia">Gastronomia</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Província</label>
                        <input type="text" id="provincia" placeholder="Ex: Luanda" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>E-mail de Contacto</label>
                    <input type="email" id="email" placeholder="empresa@email.com" required>
                </div>

                <div class="input-group">
                    <label>Breve Descrição</label>
                    <textarea id="descricao" rows="3" placeholder="Conte-nos o que oferece aos turistas..."></textarea>
                </div>

                <button type="submit" class="btn-primary">Finalizar Cadastro</button>
                <a href="../angomovel.html" class="btn-link">Voltar para o Início</a>
            </form>
        </div>
    </div>

    <script src="../js/script-cadastro.js"></script>
</body>
</html>
